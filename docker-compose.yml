version: "3.8"

services:
  trader:
    build: .
    container_name: apex_oracle_bot
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Persist the SQLite DB inside the mounted volume
      - DATABASE_URL=sqlite:////app/data/trades.db
    volumes:
      - bot_db:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8080/status', timeout=5).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_db:
